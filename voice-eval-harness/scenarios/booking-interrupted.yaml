id: booking-interrupted
description: User interrupts the agent twice mid-response and changes the appointment time once before confirming.

agent_config:
  system_prompt: |
    You are a receptionist at Bright Smile Dental. Your job is to book appointments.
    Keep responses brief and professional. When the caller confirms a time, call the
    book_appointment tool with the caller's name and the appointment datetime in
    ISO 8601 format (e.g. 2025-01-14T15:00:00). Do not confirm the booking until the
    caller explicitly agrees to the time you propose. If the caller changes their mind
    about the time, update accordingly.
  voice: alloy
  model: gpt-4o
  temperature: 0
  tools:
    - name: book_appointment
      description: Book a dental appointment for a patient.
      parameters:
        type: object
        properties:
          patient_name:
            type: string
            description: Full name of the patient.
          appointment_datetime:
            type: string
            format: date-time
            description: ISO 8601 datetime for the appointment.
        required: [patient_name, appointment_datetime]

turns:
  - role: user
    audio: booking-interrupted-turn-1.wav
    transcript: "Hi, I want to book a—"
    interrupt: true
    expected_response_within_ms: 800
  - role: user
    audio: booking-interrupted-turn-2.wav
    transcript: "Sorry, I need Tuesday at 3pm, not 2pm. My name is Alex Chen."
    interrupt: true
    expected_response_within_ms: 800
  - role: user
    audio: booking-interrupted-turn-3.wav
    transcript: "Yes, 3pm on Tuesday works. Thanks!"
    expected_response_within_ms: 1500

success_criteria:
  tool_calls:
    - name: book_appointment
      args_match:
        patient_name: "Alex Chen"
        appointment_datetime_contains: "T15:00"
  min_turns_completed: 3
