<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice AI Eval Harness — Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <style>
    /* ── Doc prose styles ─────────────────────────────────────────────── */
    .doc-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 48px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* Sidebar TOC */
    .toc {
      position: sticky;
      top: 24px;
      align-self: start;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }
    .toc-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .toc a {
      display: block;
      font-size: 13px;
      color: var(--muted);
      padding: 4px 0;
      border-left: 2px solid var(--border);
      padding-left: 12px;
      text-decoration: none;
      transition: color .15s, border-color .15s;
    }
    .toc a:hover, .toc a.active {
      color: var(--text);
      border-color: var(--accent);
    }
    .toc a.h3 { padding-left: 24px; font-size: 12px; }

    /* Prose */
    .prose { min-width: 0; }

    .prose h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      color: var(--text);
      line-height: 1.25;
    }
    .prose h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-top: 40px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      text-transform: none;
      letter-spacing: normal;
    }
    .prose h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-top: 28px;
      margin-bottom: 8px;
    }
    .prose h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-top: 20px;
      margin-bottom: 6px;
    }
    .prose p {
      color: #cbd5e1;
      line-height: 1.75;
      margin-bottom: 14px;
    }
    .prose ul, .prose ol {
      padding-left: 20px;
      margin-bottom: 14px;
    }
    .prose li {
      color: #cbd5e1;
      line-height: 1.7;
      margin-bottom: 4px;
    }
    .prose li strong { color: var(--text); }
    .prose strong { color: var(--text); font-weight: 600; }
    .prose em { color: #94a3b8; font-style: italic; }

    .prose code {
      font-family: var(--mono);
      font-size: 12px;
      background: #1e2330;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      color: #e2e8f0;
    }
    .prose pre {
      background: #1a1d27;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      overflow-x: auto;
      margin-bottom: 20px;
    }
    .prose pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      color: #e2e8f0;
    }
    .prose blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin: 16px 0;
      color: var(--muted);
      font-style: italic;
    }
    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      font-size: 13px;
    }
    .prose th {
      background: var(--surface);
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .prose td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: #cbd5e1;
      vertical-align: top;
    }
    .prose tr:last-child td { border-bottom: none; }
    .prose tr:nth-child(even) td { background: rgba(255,255,255,.02); }
    .prose a { color: var(--accent); }
    .prose a:hover { text-decoration: underline; }
    .prose hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

    /* Doc picker in header */
    .doc-tabs { display: flex; gap: 4px; }
    .doc-tab {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 4px;
      transition: color .15s, background .15s;
    }
    .doc-tab:hover { color: var(--text); background: var(--surface); }
    .doc-tab.active { color: var(--text); background: var(--surface); }

    @media (max-width: 720px) {
      .doc-layout { grid-template-columns: 1fr; }
      .toc { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1><a href="/" style="color:inherit;text-decoration:none">Voice AI Eval Harness</a></h1>
  <span class="badge">v0.1 beta</span>
  <span style="flex:1"></span>
  <nav style="display:flex;gap:4px;align-items:center;margin-right:12px">
    <a href="/" class="doc-tab">Leaderboard</a>
    <a href="/docs.html?doc=readme" class="doc-tab" id="tab-readme">README</a>
    <a href="/docs.html?doc=methodology" class="doc-tab" id="tab-methodology">Methodology</a>
    <a href="/docs.html?doc=roadmap" class="doc-tab" id="tab-roadmap">Roadmap</a>
  </nav>
  <a href="https://github.com/your-org/voice-eval-harness" style="font-size:12px;color:var(--muted)">GitHub</a>
</header>

<div class="doc-layout">
  <aside class="toc">
    <div class="toc-title">On this page</div>
    <nav id="toc-nav"></nav>
  </aside>

  <article class="prose" id="doc-content">
    <div class="loading">Loading…</div>
  </article>
</div>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  const doc = params.get("doc") || "readme";

  // Highlight active tab
  const tab = document.getElementById(`tab-${doc}`);
  if (tab) tab.classList.add("active");
  document.title = `Voice AI Eval Harness — ${doc.charAt(0).toUpperCase() + doc.slice(1)}`;

  async function load() {
    const content = document.getElementById("doc-content");
    try {
      const r = await fetch(`/api/docs/${doc}`);
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      const md = await r.text();
      content.innerHTML = marked.parse(md);
      buildTOC();
      highlightActiveHeading();
    } catch (e) {
      content.innerHTML = `<p style="color:var(--red)">Failed to load document: ${e.message}</p>`;
    }
  }

  function buildTOC() {
    const nav = document.getElementById("toc-nav");
    const headings = document.querySelectorAll(".prose h2, .prose h3");
    nav.innerHTML = "";

    headings.forEach((h, i) => {
      const id = `heading-${i}`;
      h.id = id;
      const a = document.createElement("a");
      a.href = `#${id}`;
      a.textContent = h.textContent;
      a.className = h.tagName === "H3" ? "h3" : "";
      nav.appendChild(a);
    });
  }

  function highlightActiveHeading() {
    const links = document.querySelectorAll(".toc a");
    if (!links.length) return;

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            links.forEach((l) => l.classList.remove("active"));
            const link = document.querySelector(`.toc a[href="#${entry.target.id}"]`);
            if (link) link.classList.add("active");
          }
        });
      },
      { rootMargin: "0px 0px -60% 0px" }
    );

    document.querySelectorAll(".prose h2, .prose h3").forEach((h) => observer.observe(h));
  }

  load();
})();
</script>
</body>
</html>
